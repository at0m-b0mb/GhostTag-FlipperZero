name: Build FAP

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ufbt
        run: python -m pip install --upgrade ufbt

      - name: Fetch Flipper SDK (release channel)
        run: ufbt update --channel=release

      - name: Build GhostTag.fap
        run: ufbt

      - name: Rename artifact
        run: |
          mkdir -p out
          cp dist/ghosttag.fap "out/ghosttag.fap"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghosttag-fap
          path: out/ghosttag.fap
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/ghosttag.fap
          generate_release_notes: true
