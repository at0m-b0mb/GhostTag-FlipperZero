<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080c11"/>
      <stop offset="0.55" stop-color="#0a1017"/>
      <stop offset="1" stop-color="#05080b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#0e3b2f" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0e3b2f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sweepGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#19f7a3" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#19f7a3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ghostGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#caffe9"/>
      <stop offset="1" stop-color="#19f7a3"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bdf7e2"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softbig" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#1bf5a3" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 50 H1280 M0 100 H1280 M0 150 H1280 M0 200 H1280 M0 250 H1280 M0 300 H1280 M0 350 H1280"/>
    <path d="M50 0 V400 M120 0 V400 M190 0 V400 M520 0 V400 M590 0 V400 M660 0 V400 M730 0 V400 M800 0 V400 M870 0 V400 M940 0 V400 M1010 0 V400 M1080 0 V400 M1150 0 V400 M1220 0 V400"/>
  </g>
  <!-- scanlines -->
  <g fill="#000000" fill-opacity="0.10">
    <rect y="0" width="1280" height="2"/><rect y="6" width="1280" height="2"/><rect y="12" width="1280" height="2"/>
    <rect y="386" width="1280" height="2"/><rect y="392" width="1280" height="2"/>
  </g>

  <!-- ===== RADAR ===== -->
  <g transform="translate(250,200)">
    <!-- rings -->
    <g fill="none" stroke="#19f7a3" stroke-opacity="0.35">
      <circle r="150" stroke-opacity="0.18"/>
      <circle r="110" stroke-opacity="0.25"/>
      <circle r="70" stroke-opacity="0.32"/>
      <circle r="30" stroke-opacity="0.40"/>
    </g>
    <!-- crosshair -->
    <g stroke="#19f7a3" stroke-opacity="0.18" stroke-width="1">
      <path d="M-150 0 H150 M0 -150 V150"/>
      <path d="M-106 -106 L106 106 M-106 106 L106 -106" stroke-opacity="0.10"/>
    </g>
    <!-- sweep wedge -->
    <g transform="rotate(-35)">
      <path d="M0 0 L150 0 A150 150 0 0 0 122 -86 Z" fill="url(#sweepGrad)"/>
      <line x1="0" y1="0" x2="150" y2="0" stroke="#19f7a3" stroke-width="2" stroke-opacity="0.85"/>
    </g>
    <!-- blips -->
    <circle cx="92" cy="-58" r="4" fill="#19f7a3" filter="url(#soft)"/>
    <circle cx="-70" cy="64" r="3" fill="#19f7a3" filter="url(#soft)"/>
    <circle cx="118" cy="38" r="3" fill="#29d0ff" filter="url(#soft)"/>
    <!-- THREAT blip (red) -->
    <circle cx="48" cy="40" r="6" fill="#ff3b5c" filter="url(#soft)"/>
    <circle cx="48" cy="40" r="13" fill="none" stroke="#ff3b5c" stroke-opacity="0.6" stroke-width="2"/>

    <!-- ghost in center -->
    <g filter="url(#softbig)">
      <path d="M-32 38 L-32 -2 A32 32 0 0 1 32 -2 L32 38
               Q26 30 20 38 Q14 30 8 38 Q2 30 -4 38 Q-10 30 -16 38 Q-22 30 -28 38 Z"
            fill="url(#ghostGrad)"/>
      <circle cx="-13" cy="-4" r="6" fill="#06100c"/>
      <circle cx="13" cy="-4" r="6" fill="#06100c"/>
      <circle cx="-11" cy="-6" r="2" fill="#caffe9"/>
      <circle cx="15" cy="-6" r="2" fill="#caffe9"/>
    </g>
  </g>

  <!-- ===== WORDMARK + COPY ===== -->
  <g transform="translate(520,0)">
    <text x="0" y="178" font-size="104" font-weight="800" letter-spacing="2"
          fill="url(#wordGrad)" filter="url(#soft)">GHOSTTAG</text>
    <text x="4" y="224" font-size="27" font-weight="500" letter-spacing="1.5"
          fill="#19f7a3" font-family="'SF Mono','Menlo','Consolas','Courier New',monospace">Hunt the tags that haunt you.</text>

    <line x1="6" y1="250" x2="700" y2="250" stroke="#19f7a3" stroke-opacity="0.25" stroke-width="1"/>

    <text x="6" y="280" font-size="18" letter-spacing="3" fill="#8aa6ad"
          font-family="'SF Mono','Menlo','Consolas','Courier New',monospace">BLE ANTI-STALKING TRACKER HUNTER &#183; FLIPPER ZERO</text>

    <!-- chips -->
    <g font-family="'SF Mono','Menlo','Consolas','Courier New',monospace" font-size="16" font-weight="600">
      <g transform="translate(6,306)">
        <rect width="118" height="30" rx="15" fill="#10271f" stroke="#19f7a3" stroke-opacity="0.55"/>
        <text x="59" y="20" text-anchor="middle" fill="#bdf7e2">AirTag</text>
      </g>
      <g transform="translate(134,306)">
        <rect width="92" height="30" rx="15" fill="#10271f" stroke="#19f7a3" stroke-opacity="0.55"/>
        <text x="46" y="20" text-anchor="middle" fill="#bdf7e2">Tile</text>
      </g>
      <g transform="translate(236,306)">
        <rect width="146" height="30" rx="15" fill="#10271f" stroke="#19f7a3" stroke-opacity="0.55"/>
        <text x="73" y="20" text-anchor="middle" fill="#bdf7e2">SmartTag</text>
      </g>
      <g transform="translate(392,306)">
        <rect width="138" height="30" rx="15" fill="#10271f" stroke="#19f7a3" stroke-opacity="0.55"/>
        <text x="69" y="20" text-anchor="middle" fill="#bdf7e2">Find My</text>
      </g>
    </g>
  </g>

  <!-- footer credit -->
  <text x="1262" y="384" text-anchor="end" font-size="14" letter-spacing="1" fill="#456069"
        font-family="'SF Mono','Menlo','Consolas','Courier New',monospace">github.com/at0m-b0mb &#183; v1.0</text>
</svg>
